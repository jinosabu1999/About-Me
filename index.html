<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jino Sabu | Connect With Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #0e1a2b;
      --card-color: rgba(255, 255, 255, 0.04);
      --accent: #3ee8d3;
      --text-color: #e6f1ff;
      --glass-blur: 18px;
      --hover-bg: rgba(62, 232, 211, 0.1);
      --transition-speed: 0.4s;
    }
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    html, body {
      height: 100%;
      font-family: 'Orbitron', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      scroll-behavior: smooth;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      text-align: center;
    }
    .card {
      background: var(--card-color);
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 0 50px rgba(62, 232, 211, 0.2);
      backdrop-filter: blur(var(--glass-blur));
      animation: fadeIn 1s ease-in-out;
      margin-bottom: 2rem;
    }
    .project-section {
      width: 100%;
      max-width: 1080px;
      margin-top: 3rem;
      animation: fadeInUp 1s ease-in-out;
      padding: 1rem;
    }
    .project-section h2 {
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 2rem;
      letter-spacing: 1.5px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    .project-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      width: 100%;
    }
    .project-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(62,232,211,0.05));
      border: 1px solid rgba(62, 232, 211, 0.2);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(62, 232, 211, 0.1);
      transition: transform var(--transition-speed) ease, box-shadow var(--transition-speed) ease, background var(--transition-speed) ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: slideInUp 0.8s ease both;
    }
    .project-card:hover {
      transform: translateY(-8px) scale(1.02);
      background: var(--hover-bg);
      box-shadow: 0 0 40px rgba(62, 232, 211, 0.35);
    }
    .project-title {
      font-size: 1.5rem;
      margin-bottom: 0.8rem;
      font-weight: 600;
      color: var(--accent);
    }
    .project-desc {
      font-size: 1rem;
      color: #cbdcec;
      line-height: 1.6;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .profile-pic {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.2rem;
      border: 3px solid var(--accent);
      box-shadow: 0 0 30px var(--accent);
    }
    h1.name {
      font-size: 2.6rem;
      margin-bottom: 0.6rem;
      background: linear-gradient(90deg, #3ee8d3, #00c9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 5px #3ee8d3; }
      to { text-shadow: 0 0 20px #00c9ff; }
    }
    .typewriter {
      font-family: 'Roboto Mono', monospace;
      font-size: 1.2rem;
      height: 1.2rem;
      margin-bottom: 1.5rem;
      color: #b0e6ff;
    }
    .local-greeting {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #a8d7f3;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }
    .social-icons a {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.1);
      padding: 0.8rem;
      border-radius: 50%;
      font-size: 1.6rem;
      transition: transform 0.3s ease-in-out, background 0.3s ease-in-out;
    }
    .social-icons a:hover {
      background: var(--accent);
      color: var(--bg-color);
      transform: scale(1.2);
    }
    .bio {
      text-align: left;
      margin: 2rem 0;
      font-size: 1rem;
      line-height: 1.8;
      color: #cbdcec;
      animation: slideUp 1s ease forwards;
    }
    .bio p {
      margin-bottom: 0.6rem;
      opacity: 0;
      transform: translateY(20px);
      animation: slideIn 0.6s ease forwards;
    }
    .bio p:nth-child(n) {
      animation-delay: calc(0.2s * var(--n));
    }
    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #8899aa;
    }
    @media (max-width: 600px) {
      h1.name { font-size: 2.2rem; }
      .typewriter { font-size: 1rem; }
      .bio { font-size: 0.95rem; text-align: center; }
      .project-section h2 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Content remains same -->
  </div>  <script>
    const roles = ["Mechanical Engineer", "Frontend Developer", "AI Enthusiast"];
    let i = 0, j = 0, current = '', isDeleting = false;
    function typeEffect() {
      const display = document.getElementById("typewriter");
      if (i >= roles.length) i = 0;
      if (!isDeleting) {
        current = roles[i].substring(0, j++);
        if (j > roles[i].length + 5) isDeleting = true;
      } else {
        current = roles[i].substring(0, j--);
        if (j < 0) {
          isDeleting = false;
          i++;
        }
      }
      display.textContent = current;
      setTimeout(typeEffect, isDeleting ? 50 : 130);
    }
    typeEffect();

    fetch("https://ipapi.co/json")
      .then(res => res.json())
      .then(data => {
        const country = data.country_name || "your place";
        document.getElementById("local-greeting").textContent = `👋 Greetings from ${country}!`; 
      })
      .catch(() => {
        document.getElementById("local-greeting").textContent = "👋 Welcome, friend from around the globe!";
      });
  </script></body>
</html>
